name: MyAgent_System

services:
  # 服务一：Redis Stack (存储 + 搜索索引)
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"   # Redis 端口
      - "8001:8001"   # 可视化界面端口
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} # 从 .env 自动读取密码

  # 服务二：FastAPI Agent 引擎
  agent-app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env  # 自动加载你的 API_KEY 和 密码
    environment:
      # 由于在 Docker 内部，localhost 要改成服务名 redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./data:/app/data # 将宿主机的 data 目录挂载，保证审计日志持久化到本地
      - ./config:/app/config

volumes:
  redis_data:
